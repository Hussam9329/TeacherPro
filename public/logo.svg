<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" xml:space="preserve">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- خلفية مستديرة بتدرج -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>

  <!-- كتاب مفتوح -->
  <g filter="url(#shadow)">
    <!-- الصفحة اليسرى -->
    <path d="M30 18 C26 16 20 16 16 18 L16 46 C20 44 26 44 30 46 Z" fill="url(#bookGrad)" opacity="0.95"/>
    <!-- الصفحة اليمنى -->
    <path d="M34 18 C38 16 44 16 48 18 L48 46 C44 44 38 44 34 46 Z" fill="url(#bookGrad)" opacity="0.95"/>
    <!-- خط المنتصف -->
    <line x1="32" y1="18" x2="32" y2="46" stroke="#a5b4fc" stroke-width="1.5"/>

    <!-- خطوط الصفحة اليسرى -->
    <line x1="20" y1="24" x2="26" y2="23" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="20" y1="28" x2="26" y2="27" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="20" y1="32" x2="26" y2="31" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

    <!-- علامة الصح على الصفحة اليمنى -->
    <path d="M37 32 L40 35 L45 28" stroke="#4f46e5" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- نقطة تأكيد علوية -->
  <circle cx="48" cy="18" r="5" fill="#10b981"/>
  <circle cx="48" cy="18" r="3" fill="#ffffff" opacity="0.9"/>
</svg>
