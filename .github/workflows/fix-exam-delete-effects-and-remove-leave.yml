name: Fix exam delete effects and remove leave status

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-exam-delete-effects-and-remove-leave.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply code fixes
        run: |
          node <<'NODE'
          const fs = require('fs')

          function patch(file, fn) {
            const before = fs.readFileSync(file, 'utf8')
            const after = fn(before)
            if (after !== before) fs.writeFileSync(file, after)
          }

          function mustReplace(text, from, to, label) {
            if (text.includes(to)) return text
            if (!text.includes(from)) throw new Error('missing ' + label)
            return text.replace(from, to)
          }

          patch('src/lib/teacher-store.ts', (s) => {
            s = mustReplace(s, `status: 'درجة' | 'غائب' | 'مجاز' | 'غش';`, `status: 'درجة' | 'غائب' | 'غش';`, 'grade status type')
            s = mustReplace(s, `function parseDateOnly(value: string | undefined | null): Date | null {`, `function sanitizeGradeStatus(value: unknown): Grade['status'] {\n  if (value === 'غش') return 'غش';\n  if (value === 'غائب' || value === 'مجاز') return 'غائب';\n  return 'درجة';\n}\n\nfunction parseDateOnly(value: string | undefined | null): Date | null {`, 'sanitize helper')
            s = s.replace(`        if (grade.status === 'مجاز') return { text: 'مجاز', type: 'info', kind: 'leave' };\n`, '')
            s = s.replace(`      if (grade.status === 'مجاز') continue;\n`, '')
            s = mustReplace(s, `            score: g.score === null || g.score === undefined ? null : Number(g.score),\n            academicAccountingChecked: Boolean(g.academicAccountingChecked),`, `            status: sanitizeGradeStatus(g.status),\n            score: g.score === null || g.score === undefined ? null : Number(g.score),\n            academicAccountingChecked: Boolean(g.academicAccountingChecked),`, 'sanitize server grades')
            s = mustReplace(s, `      deleteExam: (id) => {\n        const exam = get().exams.find((e) => e.id === id);\n        if (!exam) return false;\n        // Delete related grades from DB\n        get().grades.filter(g => g.examId === id).forEach(g => syncToServer(get, () => gradeApi.remove(g.id)));\n        set((s) => ({\n          exams: s.exams.filter((e) => e.id !== id),\n          grades: s.grades.filter((g) => g.examId !== id),\n          correctionSheets: s.correctionSheets.filter((sh) => sh.examId !== id),\n          opportunityLogs: s.opportunityLogs.filter((log) => log.examId !== id),\n        }));\n        get().logAction('الامتحانات', 'حذف امتحان مع سجلاته التابعة', exam.name);\n        syncToServer(get, () => examApi.remove(id));\n        return true;\n      },`, `      deleteExam: (id) => {\n        const state = get();\n        const exam = state.exams.find((e) => e.id === id);\n        if (!exam) return false;\n\n        const relatedGrades = state.grades.filter((grade) => grade.examId === id);\n        const relatedOpportunityLogs = state.opportunityLogs.filter((log) => log.examId === id);\n        const relatedCorrectionSheets = state.correctionSheets.filter((sheet) => sheet.examId === id);\n\n        relatedGrades.forEach((grade) => syncToServer(get, () => gradeApi.remove(grade.id)));\n        relatedOpportunityLogs.forEach((log) => syncToServer(get, () => opportunityLogApi.remove(log.id)));\n        relatedCorrectionSheets.forEach((sheet) => syncToServer(get, () => correctionSheetApi.remove(sheet.id)));\n\n        set((s) => ({\n          exams: s.exams.filter((e) => e.id !== id),\n          grades: s.grades.filter((g) => g.examId !== id),\n          correctionSheets: s.correctionSheets.filter((sh) => sh.examId !== id),\n          opportunityLogs: s.opportunityLogs.filter((log) => log.examId !== id),\n        }));\n\n        get().recalculateAcademicEffects();\n        get().logAction('الامتحانات', 'حذف امتحان مع سجلاته وإعادة احتساب التأثيرات', exam.name);\n        syncToServer(get, () => examApi.remove(id));\n        return true;\n      },`, 'delete exam recalc')
            s = mustReplace(s, `version: 10,`, `version: 11,`, 'persist version')
            return s
          })

          patch('src/lib/exam-utils.ts', (s) => s.replace(`return ['غائب', 'مجاز', 'غش'].includes(String(grade.status || ''));`, `return ['غائب', 'غش'].includes(String(grade.status || ''));`))

          patch('src/components/teacher-pro/grade-entry.tsx', (s) => {
            s = s.replace(`status: "درجة" | "غائب" | "مجاز" | "غش";`, `status: "درجة" | "غائب" | "غش";`)
            s = s.replace(`const statusOptions: DraftGrade["status"][] = ["درجة", "غائب", "مجاز", "غش"];`, `const statusOptions: DraftGrade["status"][] = ["درجة", "غائب", "غش"];`)
            s = s.replace(`      status: (existing?.status as DraftGrade["status"]) || "درجة",`, `      status: existing?.status === "مجاز" ? "غائب" : (existing?.status as DraftGrade["status"]) || "درجة",`)
            return s
          })

          patch('src/components/teacher-pro/grade-records.tsx', (s) => {
            s = s.replace(`type GradeStatus = "درجة" | "غائب" | "مجاز" | "غش";`, `type GradeStatus = "درجة" | "غائب" | "غش";`)
            s = s.replace(`      status: grade.status as GradeStatus,`, `      status: grade.status === "مجاز" ? "غائب" : grade.status as GradeStatus,`)
            s = s.replace(`<SelectItem value="all">الكل</SelectItem><SelectItem value="درجة">درجة</SelectItem><SelectItem value="غائب">غائب</SelectItem><SelectItem value="مجاز">مجاز</SelectItem><SelectItem value="غش">غش</SelectItem><SelectItem value="محاسبة رسوب">محاسبة رسوب</SelectItem><SelectItem value="الناجحين">الناجحين</SelectItem><SelectItem value="المخصومين">المخصومين</SelectItem>`, `<SelectItem value="all">الكل</SelectItem><SelectItem value="درجة">درجة</SelectItem><SelectItem value="غائب">غائب</SelectItem><SelectItem value="غش">غش</SelectItem><SelectItem value="محاسبة رسوب">محاسبة رسوب</SelectItem><SelectItem value="الناجحين">الناجحين</SelectItem><SelectItem value="المخصومين">المخصومين</SelectItem>`)
            return s
          })

          patch('src/components/teacher-pro/exam-records.tsx', (s) => s.replace(`notPassedCount: rows.filter((row) => row.cls.kind !== "pass" && row.cls.kind !== "leave").length,`, `notPassedCount: rows.filter((row) => row.cls.kind !== "pass").length,`))
          NODE

      - name: Commit fixes and cleanup
        run: |
          rm -f .github/workflows/fix-exam-delete-effects-and-remove-leave.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/teacher-store.ts src/lib/exam-utils.ts src/components/teacher-pro/grade-entry.tsx src/components/teacher-pro/grade-records.tsx src/components/teacher-pro/exam-records.tsx .github/workflows/fix-exam-delete-effects-and-remove-leave.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Recalculate academic effects after exam deletion and remove leave grade status"
          git push
