name: Apply build fixes once

on:
  push:
    branches: [main]
    paths:
      - 'apply-build-fixes-once.txt'

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply fixes to source
        run: |
          node scripts/build-fixes.js
          node <<'NODE'
          const fs = require('fs')
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'))
          pkg.scripts.build = 'prisma generate && prisma db push --accept-data-loss && next build && cp -r .next/static .next/standalone/.next/ && cp -r public .next/standalone/'
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n')
          for (const file of ['scripts/build-fixes.js', 'scripts/patch-student-profile-dialog.js', 'apply-build-fixes-once.txt', '.github/workflows/apply-build-fixes-once.yml']) {
            if (fs.existsSync(file)) fs.rmSync(file, { force: true })
          }
          NODE
      - name: Commit patched source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src/components/teacher-pro/student-registry.tsx src/lib/teacher-store.ts scripts/build-fixes.js scripts/patch-student-profile-dialog.js apply-build-fixes-once.txt .github/workflows/apply-build-fixes-once.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Apply source fixes for profile and WhatsApp removal"
          git push
