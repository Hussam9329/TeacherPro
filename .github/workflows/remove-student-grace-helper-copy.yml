name: Remove student grace helper copy

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/remove-student-grace-helper-copy.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Remove helper copy under registration inputs
        run: |
          node <<'NODE'
          const fs = require('fs')
          const file = 'src/components/teacher-pro/student-register.tsx'
          let s = fs.readFileSync(file, 'utf8')

          const underDate = `                  <p className="text-xs leading-5 text-muted-foreground">
                    بداية السماح: <span className="font-semibold text-foreground">{formattedGraceStart}</span>
                  </p>
`
          s = s.replace(underDate, '')

          const underDays = `                  <p className="text-xs leading-5 text-muted-foreground">
                    {accountingGraceDays > 0
                      ? <>تبدأ فترة السماح تلقائياً من <span className="font-semibold text-foreground">{formattedGraceStart}</span> وتنتهي في <span className="font-semibold text-foreground">{formattedGraceEnd}</span> حسب عدد الأيام المدخل.</>
                      : "لا توجد أيام سماح عند اختيار 0."}
                  </p>
`
          s = s.replace(underDays, '')

          fs.writeFileSync(file, s)
          NODE
      - name: Commit and cleanup
        run: |
          rm -f .github/workflows/remove-student-grace-helper-copy.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/teacher-pro/student-register.tsx .github/workflows/remove-student-grace-helper-copy.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Remove extra grace helper copy from student registration"
          git push
