name: Diagnose TeacherPro build

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-teacherpro-build.yml'

permissions:
  contents: write
  actions: read

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --include=dev
      - name: Run diagnostics
        shell: bash
        run: |
          mkdir -p diagnostics
          {
            echo "# TeacherPro build diagnostics"
            echo "Commit: $GITHUB_SHA"
            echo
            echo "## Patch script"
            node scripts/patch-student-profile-dialog.js
            echo
            echo "## TypeScript"
            npx tsc --noEmit
            echo
            echo "## Lint"
            npm run lint
          } > diagnostics/teacherpro-build.log 2>&1 || true
          cat diagnostics/teacherpro-build.log
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/teacherpro-build.log
          git commit -m "Add TeacherPro build diagnostics" || exit 0
          git push
