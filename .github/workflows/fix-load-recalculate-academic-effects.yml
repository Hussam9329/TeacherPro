name: Recalculate academic effects on load

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-load-recalculate-academic-effects.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch teacher store load recalculation
        run: |
          node <<'NODE'
          const fs = require('fs')
          const file = 'src/lib/teacher-store.ts'
          let s = fs.readFileSync(file, 'utf8')

          function mustReplace(from, to, label) {
            if (s.includes(to)) {
              console.log(`skip ${label}`)
              return
            }
            if (!s.includes(from)) throw new Error(`missing ${label}`)
            s = s.replace(from, to)
            console.log(`applied ${label}`)
          }

          mustReplace(
            `          set({\n            courses, sites, chapters, courseChapters, students,\n            exams, grades, opportunityLogs, correctionSheets, users,\n            roles, logs, demoCopies, currentUserId: nextCurrentUserId, dbConnected: true, dbLoading: false,\n          });\n\n          const adminAfterLoad = users.find((u) => isPrimaryAdminUser(u));`,
            `          set({\n            courses, sites, chapters, courseChapters, students,\n            exams, grades, opportunityLogs, correctionSheets, users,\n            roles, logs, demoCopies, currentUserId: nextCurrentUserId, dbConnected: true, dbLoading: false,\n          });\n\n          // Recalculate rule-managed opportunity and dismissal effects on every load.\n          // This also repairs stale effects left by exams/grades that were deleted before this fix.\n          get().recalculateAcademicEffects();\n\n          const adminAfterLoad = users.find((u) => isPrimaryAdminUser(u));`,
            'load recalculation'
          )

          mustReplace(
            `        // Migration v9 → v10: add per-student dismissal notes.\n        if (version < 10 && Array.isArray(nextState.students)) {\n          nextState.students = nextState.students.map((student) => ({\n            ...(student as Record<string, unknown>),\n            dismissalNotes: String((student as Record<string, unknown>).dismissalNotes || ''),\n          }));\n        }\n\n        return nextState;`,
            `        // Migration v9 → v10: add per-student dismissal notes.\n        if (version < 10 && Array.isArray(nextState.students)) {\n          nextState.students = nextState.students.map((student) => ({\n            ...(student as Record<string, unknown>),\n            dismissalNotes: String((student as Record<string, unknown>).dismissalNotes || ''),\n          }));\n        }\n\n        // Migration v10 → v11: remove the old leave/excused grade status from local snapshots.\n        if (version < 11 && Array.isArray(nextState.grades)) {\n          nextState.grades = nextState.grades.map((grade) => ({\n            ...(grade as Record<string, unknown>),\n            status: sanitizeGradeStatus((grade as Record<string, unknown>).status),\n          }));\n        }\n\n        return nextState;`,
            'v11 local migration'
          )

          fs.writeFileSync(file, s)
          NODE

      - name: Commit and cleanup
        run: |
          rm -f .github/workflows/fix-load-recalculate-academic-effects.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/teacher-store.ts .github/workflows/fix-load-recalculate-academic-effects.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Recalculate academic effects after loading data"
          git push
