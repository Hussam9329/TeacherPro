name: Apply opportunities view fixes

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'

permissions:
  contents: write

jobs:
  apply-opportunities-view-fixes:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch opportunities and student copy
        run: |
          node <<'NODE'
          const fs = require('fs')

          function replaceOnce(file, from, to, label) {
            let content = fs.readFileSync(file, 'utf8')
            if (content.includes(to)) {
              console.log(`skip ${label}: already applied`)
              return
            }
            if (!content.includes(from)) {
              throw new Error(`Missing expected block for ${label} in ${file}`)
            }
            content = content.replace(from, to)
            fs.writeFileSync(file, content)
            console.log(`applied ${label}`)
          }

          function patchOpportunities() {
            const file = 'src/components/teacher-pro/opportunities.tsx'
            let content = fs.readFileSync(file, 'utf8')

            content = content.replace('import { CustomFilterPresets, type FilterPresetValues } from "./custom-filter-presets";\n', '')
            content = content.replace('    courses,\n    opportunityLogs,', '    courses,\n    exams,\n    grades,\n    opportunityLogs,')
            content = content.replace('  const [pageSize] = useState(10);\n', '  const [pageSize] = useState(10);\n  const [detailsStudentId, setDetailsStudentId] = useState("");\n')
            content = content.replace(/\n  const applyFilterPreset = \(values: FilterPresetValues\) => \{[\s\S]*?\n  \};\n/, '\n')

            content = content.replace(
              `  const clearFilters = () => {\n    setSearch("");\n    setFilterCourseId("");\n    setFilterStatus("");\n    setPage(1);\n  };\n\n  const handleAction = runActionLocked(async () => {`,
              `  const clearFilters = () => {\n    setSearch("");\n    setFilterCourseId("");\n    setFilterStatus("");\n    setPage(1);\n  };\n\n  const selectedDetailsStudent = useMemo(\n    () => students.find((student) => student.id === detailsStudentId) || null,\n    [students, detailsStudentId],\n  );\n\n  const selectedDetailsLogs = useMemo(() => {\n    if (!detailsStudentId) return [];\n    return opportunityLogs\n      .filter((log) => log.studentId === detailsStudentId)\n      .sort((a, b) => String(b.date).localeCompare(String(a.date)));\n  }, [opportunityLogs, detailsStudentId]);\n\n  const selectedDetailsStats = useMemo(() => {\n    return selectedDetailsLogs.reduce(\n      (acc, log) => {\n        if (log.action === "خصم") acc.deducted += Number(log.amount) || 0;\n        if (log.action === "إضافة" || log.action === "فرصة أخيرة بعد تعهد") acc.added += Number(log.amount) || 0;\n        if (log.examId) acc.examLinked += 1;\n        return acc;\n      },\n      { deducted: 0, added: 0, examLinked: 0 },\n    );\n  }, [selectedDetailsLogs]);\n\n  const handleAction = runActionLocked(async () => {`,
            )

            const helper = String.raw`
  const renderLogExamDetails = (log: typeof opportunityLogs[number]) => {
    const exam = exams.find((item) => item.id === log.examId);
    const grade = grades.find((item) => item.studentId === log.studentId && item.examId === log.examId);

    if (!log.examId) {
      return (
        <div className="rounded-xl border border-border/70 bg-muted/40 p-3 text-xs leading-6 text-muted-foreground">
          حركة يدوية من إدارة الفرص، وليست مرتبطة بامتحان محدد.
        </div>
      );
    }

    if (!exam) {
      return (
        <div className="rounded-xl border border-border/70 bg-muted/40 p-3 text-xs leading-6 text-muted-foreground">
          الامتحان المرتبط بهذه الحركة غير موجود حالياً أو تم حذفه.
        </div>
      );
    }

    return (
      <div className="grid gap-2 rounded-xl border border-border/70 bg-muted/40 p-3 text-xs leading-6 md:grid-cols-2">
        <div>
          <span className="font-bold text-foreground">الامتحان: </span>
          <span className="text-muted-foreground">{exam.name}</span>
        </div>
        <div>
          <span className="font-bold text-foreground">التاريخ: </span>
          <span className="text-muted-foreground">{exam.date || "—"}</span>
        </div>
        <div>
          <span className="font-bold text-foreground">النوع: </span>
          <span className="text-muted-foreground">{exam.type}</span>
        </div>
        <div>
          <span className="font-bold text-foreground">درجة الطالب: </span>
          <span className="text-muted-foreground">
            {grade ? (grade.score !== null ? grade.status + " / " + grade.score : grade.status) : "لا توجد درجة مسجلة"}
          </span>
        </div>
        {grade?.notes ? (
          <div className="md:col-span-2">
            <span className="font-bold text-foreground">ملاحظات الدرجة: </span>
            <span className="text-muted-foreground">{grade.notes}</span>
          </div>
        ) : null}
      </div>
    );
  };
`
            content = content.replace('  return (\n    <div className="space-y-4">', helper + '\n  return (\n    <div className="space-y-4">')

            const filterBlock = String.raw`      {/* Filters */}
      <Card>
        <CardHeader className="pb-2">
          <CardTitle className="text-base">فلاتر إدارة الفرص</CardTitle>
        </CardHeader>
        <CardContent className="p-4 pt-2">
          <div className="grid grid-cols-1 gap-3 md:grid-cols-2 xl:grid-cols-5">
            <div className="space-y-1 xl:col-span-2">
              <Label htmlFor="opp-search" className="text-xs font-bold">
                بحث عن طالب
              </Label>
              <Input
                id="opp-search"
                name="search"
                autoComplete="off"
                value={search}
                onChange={(e) => {
                  setSearch(e.target.value);
                  setPage(1);
                }}
                placeholder="اسم الطالب / الكود / الهاتف / المدرسة"
              />
            </div>
            <div className="space-y-1">
              <Label htmlFor="opp-course" className="text-xs font-bold">
                الدورة
              </Label>
              <Select
                name="courseId"
                value={filterCourseId || "all"}
                onValueChange={(v) => {
                  setFilterCourseId(v === "all" ? "" : v);
                  setPage(1);
                }}
              >
                <SelectTrigger id="opp-course">
                  <SelectValue placeholder="كل الدورات" />
                </SelectTrigger>
                <SelectContent>
                  <SelectItem value="all">كل الدورات</SelectItem>
                  {courses.map((c) => (
                    <SelectItem key={c.id} value={c.id}>
                      {c.name}
                    </SelectItem>
                  ))}
                </SelectContent>
              </Select>
            </div>
            <div className="space-y-1">
              <Label htmlFor="opp-status" className="text-xs font-bold">
                حالة الطالب / الفرص
              </Label>
              <Select
                name="status"
                value={filterStatus || "all"}
                onValueChange={(v) => {
                  setFilterStatus(v === "all" ? "" : v);
                  setPage(1);
                }}
              >
                <SelectTrigger id="opp-status">
                  <SelectValue placeholder="كل الحالات" />
                </SelectTrigger>
                <SelectContent>
                  <SelectItem value="all">كل الحالات</SelectItem>
                  <SelectItem value="active">طلاب نشطون</SelectItem>
                  <SelectItem value="dismissed">طلاب مفصولون</SelectItem>
                  <SelectItem value="has-opportunities">نشط ولديه فرص</SelectItem>
                  <SelectItem value="no-opportunities">نشط بدون فرص</SelectItem>
                  <SelectItem value="temporary-dismissal">فصل مؤقت</SelectItem>
                  <SelectItem value="final-dismissal">فصل نهائي</SelectItem>
                </SelectContent>
              </Select>
            </div>
            <div className="flex items-end gap-2">
              <Button variant="outline" className="h-10 flex-1" onClick={clearFilters} disabled={!search && !filterCourseId && !filterStatus}>
                مسح
              </Button>
              <Button variant="outline" className="h-10 flex-1" onClick={exportCSV}>
                CSV
              </Button>
            </div>
          </div>
        </CardContent>
      </Card>
`
            content = content.replace(/      \{\/\* Filters \*\/\}[\s\S]*?\n\n      \{\/\* Opportunity Overview \*\/\}/, filterBlock + '\n      {/* Opportunity Overview */}')

            content = content.replace(
              '                  {/* Actions */}\n                  <div className="flex gap-1">\n                    <Button',
              '                  {/* Actions */}\n                  <div className="flex flex-wrap gap-1 lg:justify-end">\n                    <Button\n                      variant="outline"\n                      size="sm"\n                      className="text-xs"\n                      onClick={() => setDetailsStudentId(student.id)}\n                    >\n                      التفاصيل {opportunityLogs.filter((log) => log.studentId === student.id).length > 0 ? `(${opportunityLogs.filter((log) => log.studentId === student.id).length})` : ""}\n                    </Button>\n                    <Button',
            )

            content = content.replace(
              '                  className="flex items-center gap-3 p-3 rounded-2xl border bg-card/80 shadow-sm transition-all duration-200 hover:-translate-y-0.5 hover:border-primary/30 hover:shadow-lg"',
              '                  className="flex flex-col gap-3 rounded-2xl border bg-card/80 p-3 shadow-sm transition-all duration-200 hover:-translate-y-0.5 hover:border-primary/30 hover:shadow-lg lg:flex-row lg:items-center"',
            )

            content = content.replace('              opportunityLogs.slice(0, 20).map((log) => {\n                const student = students.find((s) => s.id === log.studentId);', '              opportunityLogs.slice(0, 20).map((log) => {\n                const student = students.find((s) => s.id === log.studentId);\n                const exam = exams.find((item) => item.id === log.examId);')
            content = content.replace('                      <span className="text-muted-foreground">{log.date}</span>\n                    </div>', '                      <span className="text-muted-foreground">{log.date}</span>\n                      {exam ? (\n                        <span className="mx-2 text-xs font-bold text-primary">{exam.name}</span>\n                      ) : null}\n                    </div>')

            const detailsDialog = String.raw`
      <Dialog
        open={Boolean(detailsStudentId)}
        onOpenChange={(open) => !open && setDetailsStudentId("")}
      >
        <DialogContent dir="rtl" className="max-w-3xl">
          <DialogHeader>
            <DialogTitle>
              تفاصيل فرص الطالب {selectedDetailsStudent ? "- " + selectedDetailsStudent.name : ""}
            </DialogTitle>
          </DialogHeader>

          {selectedDetailsStudent ? (
            <div className="space-y-4">
              <div className="grid gap-3 rounded-2xl border bg-muted/40 p-4 text-sm md:grid-cols-4">
                <div>
                  <p className="text-xs text-muted-foreground">الكود</p>
                  <p className="font-bold">{selectedDetailsStudent.code}</p>
                </div>
                <div>
                  <p className="text-xs text-muted-foreground">الدورة</p>
                  <p className="font-bold">{courseName(selectedDetailsStudent.courseId)}</p>
                </div>
                <div>
                  <p className="text-xs text-muted-foreground">الفرص الحالية</p>
                  <p className="font-bold">{selectedDetailsStudent.opportunities}/{selectedDetailsStudent.baseOpportunities}</p>
                </div>
                <div>
                  <p className="text-xs text-muted-foreground">الحالة</p>
                  <p className="font-bold">{selectedDetailsStudent.status}</p>
                </div>
              </div>

              <div className="grid gap-3 md:grid-cols-3">
                <div className="rounded-2xl border bg-card p-3 text-center">
                  <p className="text-xl font-black text-rose-600">{selectedDetailsStats.deducted}</p>
                  <p className="text-xs text-muted-foreground">إجمالي المخصوم</p>
                </div>
                <div className="rounded-2xl border bg-card p-3 text-center">
                  <p className="text-xl font-black text-emerald-600">{selectedDetailsStats.added}</p>
                  <p className="text-xs text-muted-foreground">إجمالي المضاف</p>
                </div>
                <div className="rounded-2xl border bg-card p-3 text-center">
                  <p className="text-xl font-black text-primary">{selectedDetailsStats.examLinked}</p>
                  <p className="text-xs text-muted-foreground">حركات مرتبطة بامتحان</p>
                </div>
              </div>

              <div className="max-h-[55vh] space-y-3 overflow-y-auto pr-1">
                {selectedDetailsLogs.length === 0 ? (
                  <p className="empty-state py-8">لا توجد حركات فرص لهذا الطالب</p>
                ) : (
                  selectedDetailsLogs.map((log) => (
                    <div key={log.id} className="space-y-3 rounded-2xl border bg-card p-4">
                      <div className="flex flex-col gap-2 md:flex-row md:items-center md:justify-between">
                        <div className="flex flex-wrap items-center gap-2">
                          <Badge
                            variant={
                              log.action === "خصم"
                                ? "destructive"
                                : log.action === "إضافة"
                                  ? "default"
                                  : "secondary"
                            }
                          >
                            {log.action} {log.amount}
                          </Badge>
                          <span className="text-sm font-bold text-foreground">{log.date}</span>
                        </div>
                        <span className="text-xs text-muted-foreground">الفصل: {log.chapterId || "غير محدد"}</span>
                      </div>
                      <div className="rounded-xl bg-muted/40 p-3 text-sm leading-6">
                        <span className="font-bold text-foreground">السبب: </span>
                        <span className="text-muted-foreground">{log.reason || "بدون سبب مكتوب"}</span>
                      </div>
                      {renderLogExamDetails(log)}
                    </div>
                  ))
                )}
              </div>
            </div>
          ) : null}
        </DialogContent>
      </Dialog>
`
            content = content.replace('      {/* Action Dialog */}\n      <Dialog', detailsDialog + '\n      {/* Action Dialog */}\n      <Dialog')

            fs.writeFileSync(file, content)
          }

          function patchStudentRegisterCopy() {
            const file = 'src/components/teacher-pro/student-register.tsx'
            let content = fs.readFileSync(file, 'utf8')
            content = content.replace('تاريخ تسجيل الطالب / بداية فترة السماح <RequiredMark />', 'تاريخ تسجيل الطالب <RequiredMark />')
            content = content.replace(`                  <p className="text-xs leading-5 text-muted-foreground">\n                    بداية السماح: <span className="font-semibold text-foreground">{formattedGraceStart}</span>\n                  </p>\n`, '')
            content = content.replace(`{accountingGraceDays > 0\n                      ? <>تنتهي فترة السماح في <span className="font-semibold text-foreground">{formattedGraceEnd}</span> حسب عدد الأيام المدخل.</>\n                      : "لا توجد أيام سماح عند اختيار 0."}`, `{accountingGraceDays > 0\n                      ? <>تبدأ فترة السماح تلقائياً من <span className="font-semibold text-foreground">{formattedGraceStart}</span> وتنتهي في <span className="font-semibold text-foreground">{formattedGraceEnd}</span> حسب عدد الأيام المدخل.</>\n                      : "لا توجد أيام سماح عند اختيار 0."}`)
            fs.writeFileSync(file, content)
          }

          patchOpportunities()
          patchStudentRegisterCopy()
          NODE

      - name: Check TypeScript build
        run: |
          npm install --include=dev
          npm run lint

      - name: Commit applied fixes and cleanup
        run: |
          git checkout HEAD^ -- package.json
          rm -f .github/workflows/apply-opportunities-view-fixes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/teacher-pro/opportunities.tsx src/components/teacher-pro/student-register.tsx package.json .github/workflows/apply-opportunities-view-fixes.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Fix opportunities filters and add student details"
          git push
