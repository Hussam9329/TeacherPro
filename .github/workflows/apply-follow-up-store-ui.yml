name: Apply follow-up store and UI

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-follow-up-store-ui.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch files
        run: |
          node <<'NODE'
          const fs = require('fs')
          function patch(file, fn){const b=fs.readFileSync(file,'utf8');const a=fn(b);if(a!==b)fs.writeFileSync(file,a)}
          function r(s,a,b,n){if(s.includes(b))return s;if(!s.includes(a))throw new Error('missing '+n);return s.replace(a,b)}

          patch('src/lib/teacher-store.ts', s => {
            s=r(s, `export interface OpportunityLog {\n  id: string;\n  studentId: string;\n  examId: string;\n  action: string;\n  amount: number;\n  reason: string;\n  date: string;\n  chapterId: string;\n}\n`, `export interface OpportunityLog {\n  id: string;\n  studentId: string;\n  examId: string;\n  action: string;\n  amount: number;\n  reason: string;\n  date: string;\n  chapterId: string;\n}\n\nexport interface StudentLeave {\n  id: string;\n  studentId: string;\n  examId: string;\n  reason: string;\n  studyType: string;\n  date: string;\n  notes: string;\n}\n\nexport interface StudentCall {\n  id: string;\n  studentId: string;\n  examId: string;\n  category: string;\n  target: string;\n  phone: string;\n  completed: boolean;\n  completedAt: string;\n  notes: string;\n  createdAt: string;\n}\n\nexport interface StudentNote {\n  id: string;\n  studentId: string;\n  kind: string;\n  text: string;\n  date: string;\n}\n`, 'follow types')
            s=s.replace(`  | 'opportunities'\n  | 'e-correction'`, `  | 'opportunities'\n  | 'follow-up'\n  | 'e-correction'`)
            s=s.replace(`  { id: 'opportunities.manage', label: 'إدارة الفرص', category: 'الفرص', level: 'manage', description: 'إضافة وخصم فرص الطلاب' },`, `  { id: 'opportunities.manage', label: 'إدارة الفرص', category: 'الفرص', level: 'manage', description: 'إضافة وخصم فرص الطلاب' },\n  { id: 'follow-up.view', label: 'عرض المتابعة', category: 'المتابعة', level: 'read', description: 'عرض الإجازات والمكالمات وملف الطالب' },\n  { id: 'follow-up.manage', label: 'إدارة المتابعة', category: 'المتابعة', level: 'manage', description: 'إضافة الإجازات والمكالمات والملاحظات' },`)
            s=s.replace(`  'opportunities': 'opportunities.view',\n  'e-correction': 'correction.view',`, `  'opportunities': 'opportunities.view',\n  'follow-up': 'follow-up.view',\n  'e-correction': 'correction.view',`)
            s=s.replace(`  opportunityLogs?: OpportunityLog[];\n  correctionSheets?: CorrectionSheet[];`, `  opportunityLogs?: OpportunityLog[];\n  studentLeaves?: StudentLeave[];\n  studentCalls?: StudentCall[];\n  studentNotes?: StudentNote[];\n  correctionSheets?: CorrectionSheet[];`)
            s=s.replace(`  opportunityLogs: OpportunityLog[];\n  correctionSheets: CorrectionSheet[];`, `  opportunityLogs: OpportunityLog[];\n  studentLeaves: StudentLeave[];\n  studentCalls: StudentCall[];\n  studentNotes: StudentNote[];\n  correctionSheets: CorrectionSheet[];`)
            s=s.replace(`  resetOpportunities: (studentId: string) => void;\n  undoOpportunityLog: (logId: string) => boolean;`, `  resetOpportunities: (studentId: string) => void;\n  undoOpportunityLog: (logId: string) => boolean;\n\n  addStudentLeave: (leave: Omit<StudentLeave, 'id'>) => void;\n  deleteStudentLeave: (id: string) => void;\n  addStudentCall: (call: Omit<StudentCall, 'id' | 'createdAt'>) => void;\n  updateStudentCall: (id: string, updates: Partial<StudentCall>) => void;\n  addStudentNote: (note: Omit<StudentNote, 'id'>) => void;\n  deleteStudentNote: (id: string) => void;`)
            s=s.replace(`    opportunityLogs: [] as OpportunityLog[],\n    correctionSheets: [] as CorrectionSheet[],`, `    opportunityLogs: [] as OpportunityLog[],\n    studentLeaves: [] as StudentLeave[],\n    studentCalls: [] as StudentCall[],\n    studentNotes: [] as StudentNote[],\n    correctionSheets: [] as CorrectionSheet[],`)
            s=s.replace(`  'courses', 'sites', 'chapters', 'courseChapters', 'students', 'exams', 'grades',\n  'opportunityLogs', 'correctionSheets',`, `  'courses', 'sites', 'chapters', 'courseChapters', 'students', 'exams', 'grades',\n  'opportunityLogs', 'studentLeaves', 'studentCalls', 'studentNotes', 'correctionSheets',`)
            s=s.replace(`function recalculateStudentsFromAcademicRules(state: Pick<TeacherState, 'students' | 'grades' | 'exams' | 'courseChapters' | 'chapters' | 'opportunityLogs'>):`, `function recalculateStudentsFromAcademicRules(state: Pick<TeacherState, 'students' | 'grades' | 'exams' | 'courseChapters' | 'chapters' | 'opportunityLogs' | 'studentLeaves'>):`)
            s=s.replace(`  const manualLogs = state.opportunityLogs.filter((log) => !isAutomaticOpportunityLog(log));\n  const automaticLogs: OpportunityLog[] = [];`, `  const manualLogs = state.opportunityLogs.filter((log) => !isAutomaticOpportunityLog(log));\n  const automaticLogs: OpportunityLog[] = [];\n  const leaveKeys = new Set((state.studentLeaves || []).map((leave) => \`${'${leave.studentId}'}:${'${leave.examId}'}\`));`)
            s=s.replace(`      if (!isGradeEntered(grade, exam)) continue;\n      if (!isExamOnOrAfterStudentRegistration(student, exam)) continue;`, `      if (!isGradeEntered(grade, exam)) continue;\n      if (!isExamOnOrAfterStudentRegistration(student, exam)) continue;\n      if (leaveKeys.has(\`${'${student.id}'}:${'${exam.id}'}\`)) continue;`)
            s=s.replace(`             exams, grades, opportunityLogs, correctionSheets, users,`, `             exams, grades, opportunityLogs, studentLeaves: get().studentLeaves || [], studentCalls: get().studentCalls || [], studentNotes: get().studentNotes || [], correctionSheets, users,`)
            s=s.replace(`      resetOpportunities: (studentId) => {`, `      addStudentLeave: (leaveData) => {\n        const leave: StudentLeave = { ...leaveData, id: uid('lv') };\n        set((s) => ({ studentLeaves: [leave, ...s.studentLeaves.filter((item) => !(item.studentId === leave.studentId && item.examId === leave.examId))] }));\n        get().logAction('المتابعة', 'إضافة إجازة', \`${'${get().studentName(leave.studentId)}'} - ${'${leave.reason}'}\`);\n        get().recalculateAcademicEffects();\n      },\n      deleteStudentLeave: (id) => {\n        set((s) => ({ studentLeaves: s.studentLeaves.filter((leave) => leave.id !== id) }));\n        get().logAction('المتابعة', 'حذف إجازة', id);\n        get().recalculateAcademicEffects();\n      },\n      addStudentCall: (callData) => {\n        const call: StudentCall = { ...callData, id: uid('call'), createdAt: todayISO() };\n        set((s) => ({ studentCalls: [call, ...s.studentCalls] }));\n        get().logAction('المتابعة', 'تسجيل مكالمة', get().studentName(call.studentId));\n      },\n      updateStudentCall: (id, updates) => {\n        set((s) => ({ studentCalls: s.studentCalls.map((call) => call.id === id ? { ...call, ...updates } : call) }));\n      },\n      addStudentNote: (noteData) => {\n        const note: StudentNote = { ...noteData, id: uid('note') };\n        set((s) => ({ studentNotes: [note, ...s.studentNotes] }));\n        get().logAction('المتابعة', 'إضافة ملاحظة', get().studentName(note.studentId));\n      },\n      deleteStudentNote: (id) => {\n        set((s) => ({ studentNotes: s.studentNotes.filter((note) => note.id !== id) }));\n      },\n\n      resetOpportunities: (studentId) => {`)
            s=s.replace(`        grades: state.grades,\n        opportunityLogs: state.opportunityLogs,\n        correctionSheets: state.correctionSheets,`, `        grades: state.grades,\n        opportunityLogs: state.opportunityLogs,\n        studentLeaves: state.studentLeaves,\n        studentCalls: state.studentCalls,\n        studentNotes: state.studentNotes,\n        correctionSheets: state.correctionSheets,`)
            return s
          })

          patch('src/components/teacher-pro/layout.tsx', s => {
            s=s.replace(`  MessageCircle,`, `  MessageCircle,\n  PhoneCall,`)
            s=s.replace(`  { id: "whatsapp", title: "واتساب", sub: "رسائل", icon: MessageCircle },`, `  { id: "follow-up", title: "المتابعة", sub: "إجازات ومكالمات", icon: PhoneCall },\n  { id: "whatsapp", title: "واتساب", sub: "رسائل", icon: MessageCircle },`)
            s=s.replace(`  { title: "المتابعة", itemIds: ["whatsapp"] },`, `  { title: "المتابعة", itemIds: ["follow-up", "whatsapp"] },`)
            s=s.replace(`import { WhatsAppView } from "./whatsapp";`, `import { FollowUpView } from "./follow-up";\nimport { WhatsAppView } from "./whatsapp";`)
            s=s.replace(`  opportunities: OpportunitiesView,\n  "e-correction": ECorrectionView,`, `  opportunities: OpportunitiesView,\n  "follow-up": FollowUpView,\n  "e-correction": ECorrectionView,`)
            return s
          })
          NODE
      - name: Commit
        run: |
          rm -f .github/workflows/apply-follow-up-store-ui.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/teacher-store.ts src/components/teacher-pro/layout.tsx .github/workflows/apply-follow-up-store-ui.yml
          git commit -m "Wire follow-up tab into store and navigation" || exit 0
          git push
