name: Remove WhatsApp roots

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/remove-whatsapp-roots.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Remove WhatsApp tab and roots
        run: |
          node <<'NODE'
          const fs = require('fs')
          function patch(file, fn) {
            const before = fs.readFileSync(file, 'utf8')
            const after = fn(before)
            if (after !== before) fs.writeFileSync(file, after)
          }
          const lineDrop = (s, needles) => s.split('\n').filter(line => !needles.some(n => line.includes(n))).join('\n')

          patch('src/components/teacher-pro/layout.tsx', s => {
            s = lineDrop(s, [
              'MessageCircle,',
              'id: "whatsapp"',
              'import { WhatsAppView }',
              'whatsapp: WhatsAppView,'
            ])
            s = s.replace('{ title: "المتابعة", itemIds: ["follow-up", "whatsapp"] },', '{ title: "المتابعة", itemIds: ["follow-up"] },')
            s = s.replace("  if (value === 'course-new' || value === 'site-management') {", "  if (value === 'whatsapp') return 'follow-up' as SectionId;\n  if (value === 'course-new' || value === 'site-management') {")
            return s
          })

          patch('src/lib/api.ts', s => {
            s = lineDrop(s, ['whatsappReports?', 'whatsappQueue?', 'whatsappReports:', 'whatsappQueue:'])
            s = s.replace(/\n  for \(const report of data\.whatsappReports\) \{\n    void report;\n  \}\n  for \(const msg of data\.whatsappQueue\) \{\n    void msg;\n  \}\n/, '\n')
            return s
          })

          patch('src/app/api/backup/route.ts', s => {
            s = lineDrop(s, ['whatsappReports', 'whatsappQueue', 'db.whatsAppReport', 'db.whatsAppMessage'])
            s = s.replace('    logs,\n    demoCopies,', '    logs,\n    demoCopies,')
            return s
          })

          patch('prisma/schema.prisma', s => {
            s = lineDrop(s, ['whatsappMessages WhatsAppMessage[]'])
            s = s.replace(/\nmodel WhatsAppReport \{[\s\S]*?\n\}\n\nmodel WhatsAppMessage \{[\s\S]*?\n\}\n(?=\nmodel DemoCopy)/, '\n')
            return s
          })

          patch('src/lib/teacher-store.ts', s => {
            s = s.replace(/\nexport interface WhatsAppReport \{[\s\S]*?\n\}\n\nexport interface WhatsAppMessage \{[\s\S]*?\n\}\n(?=\nexport interface LeaderboardSettings)/, '\n')
            s = lineDrop(s, [
              'whatsapp: number;',
              'whatsapp: 20,',
              "'whatsapp.view'",
              "'whatsapp.send'",
              "| 'whatsapp'",
              "id: 'whatsapp.view'",
              "id: 'whatsapp.send'",
              "'whatsapp': 'whatsapp.view'",
              'whatsappReports?:',
              'whatsappQueue?:',
              'whatsappReports:',
              'whatsappQueue:',
              'whatsappReports: []',
              'whatsappQueue: []',
              "'whatsappReports'",
              "'whatsappQueue'",
              'queueWhatsAppMessage:',
              'markWhatsAppMessageStatus:',
              'رسائل واتساب في الطابور',
              'whatsapp: state.whatsappQueue.length,'
            ])
            s = s.replace(/\n  \/\/ واتساب\n/g, '\n')
            s = s.replace(/\n      queueWhatsAppMessage: \(students, recipient, message, command\) => \{[\s\S]*?\n      markWhatsAppMessageStatus: \(id, status, providerMessageId, lastError\) => \{[\s\S]*?\n      \},\n(?=      exportBackup)/, '\n')
            return s
          })

          for (const file of [
            'src/components/teacher-pro/whatsapp.tsx',
            'src/app/api/whatsapp/send/route.ts',
          ]) {
            if (fs.existsSync(file)) fs.rmSync(file, { force: true })
          }
          NODE
      - name: Commit and cleanup
        run: |
          rm -f .github/workflows/remove-whatsapp-roots.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/teacher-pro/layout.tsx src/lib/teacher-store.ts src/lib/api.ts src/app/api/backup/route.ts prisma/schema.prisma src/components/teacher-pro/whatsapp.tsx src/app/api/whatsapp/send/route.ts .github/workflows/remove-whatsapp-roots.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Remove WhatsApp tab and roots"
          git push
